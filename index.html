<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Thought</title>
  <!-- Link to external CSS -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Today's Thought</h1>
    <p id="thought">Loading...</p>
    <button id="newThoughtBtn">New Thought</button>
  </div>

  <footer class="creator">
    Created by Abhishek Choudhary
  </footer>

  <script>
    // Array of daily thoughts
    const thoughts = [
      "The secret of getting ahead is getting started.",
      "Happiness is not something ready made. It comes from your own actions.",
      "The only way to do great work is to love what you do.",
      "Believe you can and you're halfway there.",
      "You are never too old to set another goal or to dream a new dream.",
      "Turn your wounds into wisdom.",
      "Do what you can, with what you have, where you are."
    ];

    const thoughtEl = document.getElementById('thought');
    const btn = document.getElementById('newThoughtBtn');

    // Function to get an index based on current date
    function getDailyIndex() {
      const now = new Date();
      const start = new Date(now.getFullYear(), 0, 0);
      const diff = now - start;
      const oneDay = 1000 * 60 * 60 * 24;
      const dayOfYear = Math.floor(diff / oneDay);
      return dayOfYear % thoughts.length;
    }

    // Display today's thought
    function showDailyThought() {
      const index = getDailyIndex();
      thoughtEl.textContent = thoughts[index];
    }

    // Show a random thought on button click
    function showRandomThought() {
      const randomIndex = Math.floor(Math.random() * thoughts.length);
      thoughtEl.textContent = thoughts[randomIndex];
    }

    // Event listener
    btn.addEventListener('click', showRandomThought);

    // Initialize
    showDailyThought();
  </script>
</body>
</html>
