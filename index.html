<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Thought Generator by abhishek</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 90%;
            text-align: center;
        }

        .thought-container {
            margin: 2rem 0;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .thought {
            font-size: 1.5rem;
            color: #333;
            line-height: 1.6;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .thought.show {
            opacity: 1;
            transform: translateY(0);
        }

        .author {
            margin-top: 1rem;
            font-style: italic;
            color: #666;
        }

        .generate-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .generate-btn:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }

        @media (max-width: 480px) {
            .container {
                padding: 1rem;
            }
            
            .thought {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Daily Inspiration By Abhishek</h1>
        <div class="thought-container">
            <p class="thought" id="thought-text"></p>
            <p class="author" id="thought-author"></p>
        </div>
        <button class="generate-btn" onclick="generateNewThought()">New Thought</button>
    </div>

    <script>
        const thoughts = [
            {
                text: "The only way to do great work is to love what you do.",
                author: "Steve Jobs"
            },
            {
                text: "In three words I can sum up everything I've learned about life: it goes on.",
                author: "Robert Frost"
            },
            {
                text: "The future belongs to those who believe in the beauty of their dreams.",
                author: "Eleanor Roosevelt"
            },
            {
                text: "Success is not final, failure is not fatal: it is the courage to continue that counts.",
                author: "Winston Churchill"
            },
            {
                text: "The only true wisdom is in knowing you know nothing.",
                author: "Socrates"
            },
            {
                text: "Be the change you wish to see in the world.",
                author: "Mahatma Gandhi"
            }
        ];

        let currentThoughtIndex = null;
        const thoughtElement = document.getElementById('thought-text');
        const authorElement = document.getElementById('thought-author');

        // Check if we have a daily thought already set today
        function getDailyThought() {
            const lastDate = localStorage.getItem('lastDate');
            const currentDate = new Date().toDateString();

            if (lastDate === currentDate) {
                const savedIndex = localStorage.getItem('thoughtIndex');
                currentThoughtIndex = savedIndex ? parseInt(savedIndex) : null;
            } else {
                // Generate new daily thought
                currentThoughtIndex = Math.floor(Math.random() * thoughts.length);
                localStorage.setItem('lastDate', currentDate);
                localStorage.setItem('thoughtIndex', currentThoughtIndex);
            }

            displayThought(currentThoughtIndex);
        }

        function displayThought(index) {
            if (index === null || index >= thoughts.length) return;
            
            thoughtElement.classList.remove('show');
            authorElement.classList.remove('show');

            setTimeout(() => {
                thoughtElement.textContent = thoughts[index].text;
                authorElement.textContent = `— ${thoughts[index].author}`;
                
                thoughtElement.classList.add('show');
                authorElement.classList.add('show');
            }, 500);
        }

        function generateNewThought() {
            const newIndex = Math.floor(Math.random() * thoughts.length);
            currentThoughtIndex = newIndex;
            displayThought(newIndex);
        }

        // Initialize on page load
        window.onload = getDailyThought;
    </script>
</body>
</html>
